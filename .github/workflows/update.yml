name: Update m3u8 links every 4 hours

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # ← مهم جدًا عشان يقدر يرفع التغييرات

    steps:
      - name: تحميل المستودع
        uses: actions/checkout@v4
        with:
          ref: main               # ← غيّر "main" لو اسم الفرع عندك مختلف (master أو غيره)
          fetch-depth: 0

      - name: تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات البايثون
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas playwright nest_asyncio

      - name: تثبيت Playwright + Chromium
        run: |
          sudo apt-get update
          npx playwright install-deps
          npx playwright install chromium --with-deps

      - name: تشغيل السكريبت
        run: python scraper.py     # ← غيّر scraper.py لاسم ملفك الحقيقي (مثلاً get_links.py)

      - name: حفظ ورفع data.json
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git add data.json
          git commit -m "تحديث تلقائي لروابط m3u8 - $(date +'%Y-%m-%d %H:%M UTC')" || echo "لا تغييرات جديدة"
          git push origin HEAD:main     # ← نفس الفرع اللي فوق
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← عشان يخفي التحذير اللي بعثته
