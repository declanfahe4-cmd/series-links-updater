      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # أو 3.12 لو عايز

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas playwright nest_asyncio

      - name: Install Playwright system dependencies + Chromium
        run: |
          sudo apt-get update
          npx playwright install-deps    # ده بيثبت كل اللي محتاجه تلقائيًا (أفضل من سرد يدوي)
          npx playwright install chromium --with-deps   # يثبت chromium + أي تبعيات ناقصة

      - name: Run the scraper script
        run: python scraper.py          # غيّر الاسم لو الملف مش اسمه scraper.py

      - name: Commit and push updated JSON if changed
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "Automated update: new m3u8 links $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
